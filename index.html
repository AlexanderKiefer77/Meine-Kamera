<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Nikon</title>    
    <link rel="icon" type="image/svg+xml" sizes="any" id="favicon">
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/standart.css">
    <link rel="stylesheet" href="./styles/darkmode.css">
    <link rel="stylesheet" href="./styles/media.css">

    <script src="./scripts/templates.js"></script>
    <script src="./scripts/fullscreen.js"></script>
</head>

<body darkmode="off">

    <header id="header" class="header">
        <div class="contentWidth">
            <section class="innerHeader">
                <h1 id="headline" onclick="openFullscreen()">Meine Kamera</h1>
            </section>
        </div>
    </header>

    <main id="aot" class="main">
        <div class="contentWidth">

            <section id="content" class="content">

                <figure class="imgCamera">
                    <img src="./assets/img/Own_1.JPG" alt="Picture from Camera">
                    <figcaption>Nikon D5600</figcaption>
                </figure>

                <nav>
                    <ul>
                        <li><button class="btn" onclick="showContent('technicDatas')">Techn. Daten</button></li>
                        <li><button class="btn" onclick="showContent('cameraModi')">Kamera-Modi</button></li>
                        <li><button class="btn" onclick="showContent('objective', 'Meine Objektive')">Meine Objektive</button></li>
                        <li><button class="btn" onclick="showContent('tips', 'Meine Tipps')">Tipps</button></li>
                    </ul>
                </nav>

            </section>

            <div id="dynamicContent" class="content-panel d_none"></div>

        </div>

    </main>

    <footer class="footer">
        <div class="contentWidth">
            <section class="innerFooter">
                <!-- Dark Mode -->
                <button id="theme-toggle" class="mode-toggle" tabindex="0" aria-label="Button for Dark Mode">
                    <span>
                        <img src="./assets/img/Sun.svg" alt="Sun Icon">
                        <img src="./assets/img/Moon.svg" alt="Moon Icon">
                    </span>
                </button>

                <div class="created">
                    <span onclick="closeFullscreen()">© Created by Alexander Kiefer</span>
                </div>

                <a href="./impressum.html">Impressum</a>

            </section>

        </div>
    </footer>


    <script src="script.js"></script>
</body>

</html>
